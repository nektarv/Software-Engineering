<!-- frontend/templates/layout.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charger Reservation System</title>
    
    <!-- Link to your CSS -->
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/style.css') }}">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Page-specific head content -->
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <!-- Logo/Brand -->
            <div class="nav-brand">
                <a href="{{ request.url_for('map_page') }}" class="brand-link">
                    <i class="fas fa-bolt"></i>
                    <span class="brand-text">Our Name</span>
                </a>
            </div>
            
            <!-- Navigation Links -->
            <div class="nav-links">
                <!-- Map Button -->
                <a href="{{ request.url_for('map_page') }}" 
                   class="nav-link {% if active_page == 'map' %}active{% endif %}">
                    <i class="fas fa-map-marked-alt"></i>
                    <span class="link-text">Map View</span>
                </a>
                
                <!-- List Button -->
                <a href="{{ request.url_for('list_page') }}" 
                   class="nav-link {% if active_page == 'list' %}active{% endif %}">
                    <i class="fas fa-list"></i>
                    <span class="link-text">List View</span>
                </a>
                
                <!-- Statistics Button -->
                <a href="{{ request.url_for('stats_page') }}" 
                   class="nav-link {% if active_page == 'list' %}active{% endif %}">
                    <i class="fas fa-chart-bar"></i>
                    <span class="link-text">Statistics</span>
                </a>
            </div>

            <!-- Authentication Section -->
            <div class="nav-profile">
                {% if is_logged_in %}
                    <!-- Logged in state -->
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="display: flex; align-items: center; gap: 8px; color: #333;">
                            <i class="fas fa-user-circle" style="color: #4CAF50; font-size: 1.2em;"></i>
                            <div>
                                <div style="font-weight: 500; font-size: 0.95em;">{{ username }}</div>
                                <div style="font-size: 0.8em; color: #666;">ID: {{ userid }}</div>
                            </div>
                        </div>
                        <form method="POST" action="/logout" style="margin: 0;">
                            <button type="submit" 
                                    style="background: #f8f9fa; color: #666; border: 1px solid #dee2e6;
                                           padding: 5px 10px; border-radius: 4px; cursor: pointer;
                                           font-size: 0.9em; transition: all 0.2s;">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </form>
                    </div>
                {% else %}
                    <!-- Not logged in state -->
                    <a href="/authentication" class="nav-link">
                        <i class="fas fa-sign-in-alt"></i>
                        <span class="link-text">Login</span>
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>EV Charger Reservation System &copy; 2024</p>
            <p class="footer-status">
                <i class="fas fa-circle status-indicator"></i>
                <span>Backend Status: Connected</span>
            </p>
        </div>
    </footer>

    <!-- Link to your JavaScript -->
    <script src="{{ request.url_for('static', path='js/main.js') }}"></script>
    
    <!-- Page-specific scripts -->
    {% block scripts %}{% endblock %}
</body>
</html>
