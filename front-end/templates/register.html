<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroWay - Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/authentication.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">ElectroWay</h1>
            <p class="auth-subtitle">Create Your Account</p>
        </div>
        
        {% if error %}
        <div class="auth-error">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/register" class="auth-form">
            <div class="form-group">
                <label for="username" class="form-label">Username:</label>
                <input type="text" id="username" name="username" class="form-input" required
                       placeholder="">
                <small>Must be at least 3 characters.</small>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password:</label>
                <input type="password" id="password" name="password" class="form-input" required
                       placeholder="">
                <small>Must be at least 6 characters.</small>
            </div>
            
            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" required>
            </div>
            
            <button type="submit" class="auth-button">Create Account</button>
        </form>
        
        <div class="auth-footer">
            <p style="margin-bottom: 1rem; color: #666;">
                Already have an account?
            </p>
            <a href="/authentication" class="back-link">
            Back to Login
            </a>
        </div>
    </div>
</body>
</html>
