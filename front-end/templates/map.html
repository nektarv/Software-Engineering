<!-- frontend/templates/map.html -->
{% extends "layout.html" %}

{% block head %}
{{ super() }}
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
<!-- Custom Map CSS -->
<link rel="stylesheet" href="/static/css/map.css">
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
{% endblock %}

{% block content %}
<div class="map-container">
    <!-- Page Title -->
    <h1 style="padding: 20px;">Charger Map</h1>
    <p style="padding: 0 20px 20px 20px;">Click on any charger pin to view details and make a reservation.</p>

    <!-- Map Controls (floating over map) -->
    <div class="map-controls">
        <h4>Filter by Status:</h4>
        
        <select id="status-filter" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
            <option value="all">Show All</option>
            <option value="available" selected>Available</option>
            <option value="charging">Charging</option>
            <option value="reserved">Reserved</option>
            <option value="malfunction">Malfunction</option>
            <option value="offline">Offline</option>
        </select>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Charger Details Panel (initially hidden) -->
    <div id="charger-details" style="display: none;">
        <h3>Charger Details</h3>
        <div id="charger-info-content"></div>
    </div>
</div>

<div id="reservationModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10000; align-items:center; justify-content:center;">
    <div style="background:white; padding:25px; border-radius:12px; width:300px; text-align:center; color: black;">
        <h3 style="margin-top:0;">Reserve Charger</h3>
        <p>Select duration (minutes):</p>
        <select id="durationSelect" style="width:100%; padding:10px; margin:15px 0; border-radius:6px; border: 1px solid #ccc;">
            <option value="1" selected>1 Minutes</option>
            <option value="2">2 Minutes</option>
            <option value="3">3 Minutes (Max)</option>
        </select>
        <div style="display:flex; gap:10px;">
            <button type="button" onclick="closeModal()" style="flex:1; padding:10px; background:#ccc; border:none; border-radius:6px; cursor:pointer;">Cancel</button>
            <button type="button" id="confirmReserveBtn" style="flex:1; padding:10px; background:#28a745; color:white; border:none; border-radius:6px; cursor:pointer;">Confirm</button>
        </div>
    </div>
</div>



<script>
// Initialize the map
function fitMapToMarkers() {
    if (chargerMarkers.length === 0) return;  // Nothing to fit

    const group = new L.featureGroup(chargerMarkers);
    map.fitBounds(group.getBounds().pad(0.2));  // Add padding so markers aren’t at the edge
}

const map = L.map('map').setView([37.9838, 23.7275], 11);

// Add OpenStreetMap tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
}).addTo(map);

// Store charger markers for filtering
let chargerMarkers = [];
let currentChargers = {{ chargers | tojson | safe }};

// ----------------------------------------------------------------------
// ελεγχος URL για PointID (από το κουμπί 'See on map') 
// Αν υπάρχει pointid στο URL, κρατάμε ΜΟΝΟ αυτόν τον φορτιστή στη λίστα
const urlParams = new URLSearchParams(window.location.search);
const targetPointId = urlParams.get('pointid');

if (targetPointId) {
    currentChargers = currentChargers.filter(c => c.pointid == targetPointId);
}
// ---------------------------------------------------------------------

// Function to get status color for markers
function getStatusColor(status) {
    switch(status.toLowerCase()) {
        case 'available': return '#28a745';  // green
        case 'charging': return '#3498db';   // blue
        case 'reserved': return '#6f42c1';   // purple
        case 'malfunction': return '#fd7e14';// orange
        case 'offline': return '#6c757d';    // gray
        default: return '#17a2b8';           // light blue for unknown
    }
}

// Function to get status class for details panel
function getStatusClass(status) {
    switch(status.toLowerCase()) {
        case 'available': return 'status-available';
        case 'charging': return 'status-charging';
        case 'reserved': return 'status-reserved';
        case 'malfunction': return 'status-malfunction';
        case 'offline': return 'status-offline';
        default: return 'status-unknown';
    }
}

// Create markers
function createMarkers(chargers) {
    // Clear existing markers
    chargerMarkers.forEach(marker => map.removeLayer(marker));
    chargerMarkers = [];
    const backendUrl = {{ backend_url | tojson | safe }};

    chargers.forEach(charger => {
        const marker = L.circleMarker([charger.lat, charger.lon], {
            radius: 10,
            fillColor: getStatusColor(charger.status),
            color: '#000',
            weight: 1,
            opacity: 1,
            fillOpacity: 0.8
        }).addTo(map);

        marker.on('click', () => showChargerDetails(charger));
        chargerMarkers.push(marker);
    });
}

// Show charger details
// Show charger details with API call
// Show charger details with Client-Side Reverse Geocoding (Address Lookup)
function showChargerDetails(charger) {
    console.log("CLICK", performance.now());
    const detailsPanel = document.getElementById('charger-details');
    const contentDiv = document.getElementById('charger-info-content');

    // Show loading state
    contentDiv.innerHTML = `
        <div class="charger-detail-item">
            <strong>Loading charger details...</strong>
        </div>
    `;

    detailsPanel.style.display = 'block';

    // Make API call to frontend endpoint
    console.log("FETCH START", performance.now());
    fetch(`/fetch-charger/${charger.pointid}`)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(async (chargerData) => {
            
            //  ΔΙΕΥΘΥΝΣΗ (REVERSE GEOCODING)
            let addressDisplay = "<em>Locating...</em>"; // Αρχική τιμή όσο ψάχνει
            
            try {
                // Καλούμε το OpenStreetMap με τις συντεταγμένες από το Backend
                const osmUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${chargerData.lat}&lon=${chargerData.lon}`;
                
                const osmResponse = await fetch(osmUrl, {
                    headers: { 'User-Agent': 'EV-Student-Project' } // Απαραίτητο για να μην μας μπλοκάρουν
                });
                
                if (osmResponse.ok) {
                    const osmData = await osmResponse.json();
                    
                    // Οδός + Αριθμός
                    const road = osmData.address.road || osmData.address.pedestrian || "";
                    const number = osmData.address.house_number || "";
                    const suburb = osmData.address.suburb || osmData.address.city || "";
                    
                    if (road) {
                        addressDisplay = `${road} ${number}, ${suburb}`;
                    } else {
                        // Αν δεν βρει οδό, παίρνουμε το γενικό όνομα
                        addressDisplay = osmData.display_name.split(',')[0];
                    }
                } else {
                    addressDisplay = "Address not found";
                }
            } catch (err) {
                console.error("Geocoding error:", err);
                addressDisplay = "Address service unavailable";
            }
            // -----------------------------------------------------------

            // --- 2. ΕΜΦΑΝΙΣΗ ΣΤΟ HTML ---
            contentDiv.innerHTML = `
                <div class="charger-detail-item"><strong>ID:</strong> ${chargerData.pointid}</div>
                <div class="charger-detail-item"><strong>Provider:</strong> ${chargerData.provider || '-'}</div>
                
                <div class="charger-detail-item"><strong>Address:</strong> ${addressDisplay}</div>
                
                <div class="charger-detail-item"><strong>Power:</strong> ${chargerData.cap || chargerData.power || '-'} kW</div>
                <div class="charger-detail-item"><strong>Price:</strong> €${chargerData.kwhprice}/kWh</div>
                
                <div class="charger-detail-item" style="margin-top:10px;">
                    <strong>Status:</strong> 
                    <span class="${getStatusClass(chargerData.status)}" style="padding: 2px 8px; border-radius:10px; color:white; background-color:${getStatusColor(chargerData.status)}">
                        ${chargerData.status.toUpperCase()}
                    </span>
                </div>

                ${chargerData.reservationendtime ? 
                    `<div class="charger-detail-item"><small>Reserved until: ${chargerData.reservationendtime}</small></div>` 
                    : ''}

                <hr>
                <button onclick="reserveCharger(${chargerData.pointid})" class="reserve-btn">Reserve Now</button>
            `;
        })
        .catch(error => {
            console.error('Error fetching charger details:', error);
            contentDiv.innerHTML = `
                <div class="charger-detail-item">
                    <strong>Error loading charger details</strong>
                </div>
                <div class="charger-detail-item">
                    <strong>ID:</strong> ${charger.pointid}
                </div>
                <div class="charger-detail-item">
                    <strong>Status:</strong> <span class="${getStatusClass(charger.status)}">${charger.status}</span>
                </div>
                <button onclick="reserveCharger(${charger.pointid})" class="reserve-btn">Reserve</button>
            `;
        });
}


let selectedPointId = null;

// Συνάρτηση που ανοίγει το Modal (την καλεί το κουμπί Reserve Now)
function reserveCharger(pointid) {
    selectedPointId = pointid;
    const modal = document.getElementById('reservationModal');
    modal.style.display = 'flex'; // Χρησιμοποιούμε flex για να κεντραριστεί
}

// Συνάρτηση που κλείνει το Modal (την καλεί το κουμπί Cancel)
function closeModal() {
    const modal = document.getElementById('reservationModal');
    modal.style.display = 'none';
    selectedPointId = null;
}

document.getElementById('confirmReserveBtn').addEventListener('click', async function() {
    if (!selectedPointId) return;
    const minutes = document.getElementById('durationSelect').value;
    const btn = this;
    
    btn.disabled = true;
    btn.innerText = "Processing...";

    try {
        const response = await fetch(`/reserve/${selectedPointId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ duration: parseInt(minutes) })
        });

        const data = await response.json();

        if (response.status === 401) {
            alert("Please login first!");
            window.location.href = "/authentication";
        } else if (data.success || (data.status === "reserved")) {
            alert("Reservation Successful!");
            
            
            closeModal(); // Κλείνει το παράθυρο αμέσως
            
            location.reload(); // Μετά κάνει ανανέωση για να δεις τη μωβ πινέζα
        } else {
            alert("Failed: Charger is not available.");
            closeModal();
        }
    } catch (err) {
        alert("An error occurred.");
        closeModal();
    } finally {
        btn.disabled = false;
        btn.innerText = "Confirm";
    }
});

// Apply filters
// --- ΝΕΟΣ ΚΩΔΙΚΑΣ ΜΟΝΟ ΓΙΑ ΤΑ ΦΙΛΤΡΑ ---

// Συνάρτηση φίλτρου για Dropdown
function applyFilters() {
    const dropdown = document.getElementById('status-filter');
    
    // Αν δεν βρεθεί το dropdown, σταματάμε (για αποφυγή errors)
    if (!dropdown) return;

    const selectedStatus = dropdown.value; // 'all', 'available', 'charging' κλπ.

    const filtered = currentChargers.filter(charger => {
        // Αν είναι 'all', τα δείχνουμε όλα
        if (selectedStatus === 'all') {
            return true;
        }
        // Αλλιώς συγκρίνουμε το status
        return charger.status.toLowerCase() === selectedStatus;
    });

    createMarkers(filtered);
}

// Event Listener: Όταν αλλάζει το dropdown, τρέχει το φίλτρο
const dropdownElement = document.getElementById('status-filter');
if (dropdownElement) {
    dropdownElement.addEventListener('change', applyFilters);
}


// -------------------------------------------------
// Initialization 
// Δημιουργία πινεζών
applyFilters();

// Έλεγχος αν ήρθαμε από το "See on map" (υπάρχει targetPointId)
if (targetPointId && currentChargers.length > 0) {
    const targetCharger = currentChargers[0];
    
    // Ζουμάρουμε κατευθείαν πάνω στην πινέζα
    map.setView([targetCharger.lat, targetCharger.lon], 14);
    
    // Ανοίγουμε αυτόματα το panel πληροφοριών
    showChargerDetails(targetCharger);
} else {
    // Αλλιώς, δείχνουμε όλο τον χάρτη κανονικά
    fitMapToMarkers();
}
// ------------------------------------------------
</script>
{% endblock %}
