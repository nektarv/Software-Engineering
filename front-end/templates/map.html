<!-- frontend/templates/map.html -->
{% extends "layout.html" %}

{% block head %}
{{ super() }}
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
<!-- Custom Map CSS -->
<link rel="stylesheet" href="/static/css/map.css">
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
{% endblock %}

{% block content %}
<div class="map-container">
    <!-- Sidebar (hidden until click) -->
    <aside id="charger-sidebar" class="sidebar hidden">
        <div class="sidebar-header">
            <h3 style="margin:0;">Charger information</h3>
            <button type="button" class="sidebar-close" onclick="closeSidebar()">✕</button>
        </div>

        <div id="charger-info-content"></div>
    </aside>

    <!-- Map column -->
    <div class="map-main">
        <div class="map-controls">
            <h4>Filter by Status:</h4>

            <select id="status-filter" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="all">Show All</option>
                <option value="available" selected>Available</option>
                <option value="charging">Charging</option>
                <option value="reserved">Reserved</option>
                <option value="malfunction">Malfunction</option>
                <option value="offline">Offline</option>
            </select>
        </div>

        <div id="map"></div>
    </div>
</div>


<div id="reservationModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10000; align-items:center; justify-content:center;">
    <div style="background:white; padding:25px; border-radius:12px; width:300px; text-align:center; color: black;">
        <h3 style="margin-top:0;">Reserve Charger</h3>
        <p>Select duration (minutes):</p>
        <select id="durationSelect" style="width:100%; padding:10px; margin:15px 0; border-radius:6px; border: 1px solid #ccc;">
            <option value="1" selected>1 Minutes</option>
            <option value="2">2 Minutes</option>
            <option value="3">3 Minutes (Max)</option>
        </select>
        <div style="display:flex; gap:10px;">
            <button type="button" onclick="closeModal()" style="flex:1; padding:10px; background:#ccc; border:none; border-radius:6px; cursor:pointer;">Cancel</button>
            <button type="button" id="confirmReserveBtn" style="flex:1; padding:10px; background:#28a745; color:white; border:none; border-radius:6px; cursor:pointer;">Confirm</button>
        </div>
    </div>
</div>



<script>

// --- JINJA VARIABLES ---
const isUserLoggedIn = {{ is_logged_in | tojson }};
const currentUserId = {{ userid | tojson }};
// -----------------------


// Initialize the map
function fitMapToMarkers() {
    if (chargerMarkers.length === 0) return;  // Nothing to fit

    const group = new L.featureGroup(chargerMarkers);
    map.fitBounds(group.getBounds().pad(0.2));  // Add padding so markers aren’t at the edge
}

const map = L.map('map').setView([37.9838, 23.7275], 11);

// Add OpenStreetMap tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
}).addTo(map);

// This line of code makes the sidebar close when clicking the map
//map.on('click', () => closeSidebar());


// Store charger markers for filtering
let chargerMarkers = [];
let currentChargers = {{ chargers | tojson | safe }};

// ----------------------------------------------------------------------
// ελεγχος URL για PointID (από το κουμπί 'See on map') 
// Αν υπάρχει pointid στο URL, κρατάμε ΜΟΝΟ αυτόν τον φορτιστή στη λίστα
const urlParams = new URLSearchParams(window.location.search);
const targetPointId = urlParams.get('pointid');

if (targetPointId) {
    currentChargers = currentChargers.filter(c => c.pointid == targetPointId);
}
// ---------------------------------------------------------------------

// Function to get status color for markers
function getStatusColor(status) {
    switch(status.toLowerCase()) {
        case 'available': return '#28a745';  // green
        case 'charging': return '#3498db';   // blue
        case 'reserved': return '#6f42c1';   // purple
        case 'malfunction': return '#fd7e14';// orange
        case 'offline': return '#6c757d';    // gray
        default: return '#17a2b8';           // light blue for unknown
    }
}

// Function to get status class for details panel
function getStatusClass(status) {
    switch(status.toLowerCase()) {
        case 'available': return 'status-available';
        case 'charging': return 'status-charging';
        case 'reserved': return 'status-reserved';
        case 'malfunction': return 'status-malfunction';
        case 'offline': return 'status-offline';
        default: return 'status-unknown';
    }
}

// Create markers
function createMarkers(chargers) {
    // Clear existing markers
    chargerMarkers.forEach(marker => map.removeLayer(marker));
    chargerMarkers = [];
    const backendUrl = {{ backend_url | tojson | safe }};

    chargers.forEach(charger => {
        const marker = L.circleMarker([charger.lat, charger.lon], {
            radius: 10,
            fillColor: getStatusColor(charger.status),
            color: '#000',
            weight: 1,
            opacity: 1,
            fillOpacity: 0.8
        }).addTo(map);

        marker.on('click', () => showChargerDetails(charger));
        chargerMarkers.push(marker);
    });
}
// Auxiliary functions for showchargerdetails, to help with sidebar

function openSidebar() {
    const sidebar = document.getElementById('charger-sidebar');
    if (!sidebar) return;

    sidebar.classList.remove('hidden');

    // Let CSS transition apply, then force Leaflet to recalc
    setTimeout(() => map.invalidateSize(), 220);
}

function closeSidebar() {
    const sidebar = document.getElementById('charger-sidebar');
    if (!sidebar) return;

    sidebar.classList.add('hidden');
    setTimeout(() => map.invalidateSize(), 220);
}

// Show charger details
// Show charger details with API call
// Show charger details with Client-Side Reverse Geocoding (Address Lookup)
// Show charger details
function showChargerDetails(charger) {
    const sidebar = document.getElementById('charger-sidebar');
    const contentDiv = document.getElementById('charger-info-content');
    if (!sidebar || !contentDiv) return;

    sidebar.classList.remove('hidden');

    // Require stationid on the marker object
    if (!charger.stationid) {
        contentDiv.innerHTML = `
            <div class="charger-detail-item"><strong>Error:</strong> stationid missing from marker data.</div>
            <div class="charger-detail-item">Update /api/stations to include stationid.</div>
        `;
        return;
    }

    // Loading state
    contentDiv.innerHTML = `
        <div class="charger-detail-item">
            <strong>Loading station details...</strong>
        </div>
    `;

    fetch(`/fetch-station/${charger.stationid}`)
        .then(response => {
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return response.json();
        })
        .then(stationData => {
            const addressDisplay = stationData.address || "Address details not available";

            // Station-level favourite star
            const isFav = stationData.is_favourite === 1;
            const starHtml = isUserLoggedIn
                ? `
                    <button id="star-btn-station-${stationData.stationid}"
                            class="star-btn"
                            style="font-size: 1.8rem; cursor: pointer; border:none; background:none; color: #ffc107; line-height: 1; padding: 0 10px;"
                            onclick="toggleStar(${stationData.stationid}, 0, ${isFav})"
                            title="${isFav ? 'Remove from favorites' : 'Add to favorites'}">
                        ${isFav ? '★' : '☆'}
                    </button>
                  `
                : `<a href="/authentication" style="text-decoration:none; font-size:1.5rem; color:#ccc;" title="Login to favorite">☆</a>`;
            //debug
            console.log("stationData keys:", Object.keys(stationData));
            console.log("stationData.outlets:", stationData.outlets);
            console.log("isArray:", Array.isArray(stationData.outlets), "length:", stationData.outlets?.length);

            const outlets = Array.isArray(stationData.outlets) ? stationData.outlets : [];

            const outletsHtml = outlets.map(o => {
                const statusLower = (o.status || '').toLowerCase();
                return `
                    <div style="border:1px solid #eee; border-radius:10px; padding:10px; margin:10px 0;">
                        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
                            <div><strong>Outlet ID:</strong> ${o.pointid}</div>
                            <span class="${getStatusClass(o.status)}"
                                  style="padding: 2px 8px; border-radius:10px; color:white; background-color:${getStatusColor(o.status)}">
                                ${(o.status || '').toUpperCase()}
                            </span>
                        </div>

                        <div class="charger-detail-item" style="border-bottom:none; padding:4px 0;">
                            <strong>Connector:</strong> ${o.connector || '-'}
                        </div>
                        <div class="charger-detail-item" style="border-bottom:none; padding:4px 0;">
                            <strong>Power:</strong> ${o.cap ?? 0} kW
                        </div>
                        <div class="charger-detail-item" style="border-bottom:none; padding:4px 0;">
                            <strong>Price:</strong> ${o.kwhprice != null ? `€${o.kwhprice}/kWh` : '-'}
                        </div>

                        ${o.reservationendtime
                            ? `<div class="charger-detail-item" style="border-bottom:none; padding:4px 0;">
                                   <small>Reserved until: ${o.reservationendtime}</small>
                               </div>`
                            : ''}

                        ${statusLower === 'available'
                            ? `<button onclick="reserveCharger(${o.pointid})" class="reserve-btn">Reserve this outlet</button>`
                            : ''}
                    </div>
                `;
            }).join('');

            contentDiv.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <div class="charger-detail-item" style="margin:0;">
                        <strong>Station:</strong> ${stationData.stationid}
                    </div>
                    ${starHtml}
                </div>

                <div class="charger-detail-item"><strong>Provider:</strong> ${stationData.provider || '-'}</div>
                <div class="charger-detail-item"><strong>Address:</strong> ${addressDisplay}</div>

                <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=${stationData.lat},${stationData.lon}', '_blank')"
                        style="width: 100%; margin-top: 10px; padding: 10px; background-color: #4285F4; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">
                    📍 Navigate (Google Maps)
                </button>

                <hr>

                <h4 style="margin: 10px 0;">Outlets</h4>
                ${outletsHtml || `<div class="charger-detail-item">No outlets found.</div>`}
            `;
        })
        .catch(error => {
            console.error('Error fetching station details:', error);
            contentDiv.innerHTML = `
                <div class="charger-detail-item"><strong>Error loading station details</strong></div>
                <div class="charger-detail-item"><strong>Station ID:</strong> ${charger.stationid}</div>
            `;
        });
}







// Συνάρτηση για προσθήκη/αφαίρεση αγαπημένων (AJAX)
async function toggleStar(stationId, pointId, isCurrentlyFav) {
    const btn = document.getElementById(`star-btn-${pointId}`);
    if (!btn) return;
    
    btn.disabled = true; // Κλείδωμα για αποφυγή διπλού κλικ

    // Επιλογή endpoint ανάλογα με την κατάσταση
    const endpoint = isCurrentlyFav ? '/favourites/remove_json' : '/favourites/add_json';
    
    const formData = new FormData();
    formData.append('stationid', stationId);
    if (currentUserId) formData.append('userid', currentUserId);

    try {
        const res = await fetch(endpoint, {
            method: 'POST',
            body: formData
        });
        
        const result = await res.json();
        
        if (result.success || res.ok) {
            // Αν όλα πήγαν καλά, αντιστρέφουμε την κατάσταση τοπικά
            const newIsFav = !isCurrentlyFav;
            btn.innerHTML = newIsFav ? '★' : '☆';
            btn.title = newIsFav ? 'Remove from favorites' : 'Add to favorites';
            // Ενημερώνουμε το onclick για την επόμενη φορά
            btn.onclick = () => toggleStar(stationId, pointId, newIsFav);
        } else {
            alert('Could not update favorites. Please try again.');
        }
    } catch (err) {
        console.error("Star Error:", err);
    } finally {
        btn.disabled = false;
    }
}





let selectedPointId = null;

// Συνάρτηση που ανοίγει το Modal (την καλεί το κουμπί Reserve Now)
function reserveCharger(pointid) {
    selectedPointId = pointid;
    const modal = document.getElementById('reservationModal');
    modal.style.display = 'flex'; // Χρησιμοποιούμε flex για να κεντραριστεί
}

// Συνάρτηση που κλείνει το Modal (την καλεί το κουμπί Cancel)
function closeModal() {
    const modal = document.getElementById('reservationModal');
    modal.style.display = 'none';
    selectedPointId = null;
}

document.getElementById('confirmReserveBtn').addEventListener('click', async function() {
    if (!selectedPointId) return;
    const minutes = document.getElementById('durationSelect').value;
    const btn = this;
    
    btn.disabled = true;
    btn.innerText = "Processing...";

    try {
        const response = await fetch(`/reserve/${selectedPointId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ duration: parseInt(minutes) })
        });

        // ΑΜΕΣΟ REDIRECT ΑΝ ΔΕΝ ΕΙΝΑΙ LOGGED IN
        if (response.status === 401) {
            window.location.href = "/authentication";
            return; 
        }

        const data = await response.json();

        if (data.success || (data.status === "reserved")) {
            
            // Οπτικό feedback στο κουμπί
            btn.innerText = "Success!";
            btn.style.background = "#28a745";
            
            setTimeout(() => {
                // --- ΑΛΛΑΓΗ: INSTANT UPDATE (ΧΩΡΙΣ RELOAD) ---
                
                // Βρίσκουμε τον φορτιστή στη λίστα που έχουμε ήδη στη μνήμη
                // Χρησιμοποιούμε == για να πιάσουμε και string και number ID
                const chargerToUpdate = currentChargers.find(c => c.pointid == selectedPointId);
                
                // 2. Ενημερώνουμε τα δεδομένα του τοπικά
                if (chargerToUpdate) {
                    chargerToUpdate.status = 'reserved';
                    // Αν το backend επέστρεψε ώρα λήξης, την ενημερώνουμε κι αυτή
                    if (data.reservationendtime) {
                        chargerToUpdate.reservationendtime = data.reservationendtime;
                    }
                }

                // Ξανατρέχουμε το φίλτρο/markers για να βαφτεί μωβ αμέσως
                applyFilters();

                // Κλείνουμε το modal
                closeModal();
                
                // Κλείνουμε το panel λεπτομερειών για να αναγκάσουμε τον χρήστη 
                // να ξαναπατήσει και να δει τα νέα δεδομένα (προαιρετικό)
                const detailsPanel = document.getElementById('charger-details');
                if (detailsPanel) {
                    detailsPanel.style.display = 'none';
                }

            }, 800); 

        } else {
            
            btn.innerText = "Unavailable";
            btn.style.background = "#dc3545";
            setTimeout(() => {
                closeModal();
            }, 1500);
        }
    } catch (err) {
        console.error(err);
        btn.innerText = "Error";
        setTimeout(() => closeModal(), 1500);
    } finally {
        // Επαναφορά κουμπιού (αν ξανανοίξει το modal)
        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = "Confirm";
            btn.style.background = "#28a745"; 
        }, 1600);
    }
});

// Apply filters
// --- ΝΕΟΣ ΚΩΔΙΚΑΣ ΜΟΝΟ ΓΙΑ ΤΑ ΦΙΛΤΡΑ ---

// Συνάρτηση φίλτρου για Dropdown
function applyFilters() {
    const dropdown = document.getElementById('status-filter');
    
    // Αν δεν βρεθεί το dropdown, σταματάμε (για αποφυγή errors)
    if (!dropdown) return;

    const selectedStatus = dropdown.value; // 'all', 'available', 'charging' κλπ.

    const filtered = currentChargers.filter(charger => {
        // Αν είναι 'all', τα δείχνουμε όλα
        if (selectedStatus === 'all') {
            return true;
        }
        // Αλλιώς συγκρίνουμε το status
        return charger.status.toLowerCase() === selectedStatus;
    });

    createMarkers(filtered);
}

// Event Listener: Όταν αλλάζει το dropdown, τρέχει το φίλτρο
const dropdownElement = document.getElementById('status-filter');
if (dropdownElement) {
    dropdownElement.addEventListener('change', applyFilters);
}


// -------------------------------------------------
// Initialization 
// Δημιουργία πινεζών
applyFilters();

// Έλεγχος αν ήρθαμε από το "See on map" (υπάρχει targetPointId)
if (targetPointId && currentChargers.length > 0) {
    const targetCharger = currentChargers[0];
    
    // Ζουμάρουμε κατευθείαν πάνω στην πινέζα
    map.setView([targetCharger.lat, targetCharger.lon], 14);
    
    // Ανοίγουμε αυτόματα το panel πληροφοριών
    showChargerDetails(targetCharger);
} else {
    // Αλλιώς, δείχνουμε όλο τον χάρτη κανονικά
    fitMapToMarkers();
}
// ------------------------------------------------
</script>
{% endblock %}
